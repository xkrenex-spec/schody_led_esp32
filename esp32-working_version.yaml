substitutions:
  devicename: esp32c6_ws2811_white
  led_pin: GPIO21
  num_leds: "20"
  rgb_order: "GRB"
  fade_px: "10"

esphome:
  name: ${devicename}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  reboot_timeout: 15min
  port: 6053

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  ap:
    ssid: "${devicename}-fallback"
    password: "12345678"

captive_portal:

mdns:
  disabled: false

number:
  - platform: template
    id: fx_on_duration_s
    name: "FX Turn ON Duration"
    unit_of_measurement: "s"
    min_value: 0.2
    max_value: 30
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 4.0

  - platform: template
    id: fx_off_duration_s
    name: "FX Turn OFF Duration"
    unit_of_measurement: "s"
    min_value: 0.2
    max_value: 30
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 4.0

  - platform: template
    id: fx_min_brightness
    name: "FX Min Brightness"
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0

  - platform: template
    id: fx_max_brightness
    name: "FX Max Brightness"
    unit_of_measurement: "%"
    min_value: 1
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 100

  - platform: template
    id: fx_global_fade_duration_s
    name: "FX Global Fade Duration"
    unit_of_measurement: "s"
    min_value: 0.1
    max_value: 10
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 2.0

button:
  - platform: template
    name: "Run FX On Forward"
    on_press:
      - script.execute: fx_on_forward

  - platform: template
    name: "Run FX On Reverse"
    on_press:
      - script.execute: fx_on_reverse

  - platform: template
    name: "Run FX Off Forward"
    on_press:
      - script.execute: fx_off_forward

  - platform: template
    name: "Run FX Off Reverse"
    on_press:
      - script.execute: fx_off_reverse

  - platform: template
    name: "Run FX All ON (Fade)"
    on_press:
      - script.execute: fx_all_on

  - platform: template
    name: "Run FX All OFF (Fade)"
    on_press:
      - script.execute: fx_all_off

globals:
  - id: fx_start_ms
    type: uint32_t
    initial_value: '0'
  - id: fx_duration_ms
    type: int
    initial_value: '1000'

light:
  - platform: esp32_rmt_led_strip
    id: strip
    name: "WS2811 White Strip"
    pin: ${led_pin}
    num_leds: ${num_leds}
    chipset: WS2811
    rgb_order: ${rgb_order}
    default_transition_length: 0s
    restore_mode: ALWAYS_OFF
    effects:
      - addressable_lambda:
          name: "On Forward Smooth"
          update_interval: 16ms
          lambda: |-
            const int N = it.size();
            const float fade = (float) ${fade_px};
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
            if (p < 0.0f) p = 0.0f; if (p > 1.0f) p = 1.0f;
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const float front = p * (N + fade);
            for (int i = 0; i < N; i++) {
              float x = (front - (float)i) / fade;
              if (x < 0.0f) x = 0.0f; if (x > 1.0f) x = 1.0f;
              float b = x * x * (3.0f - 2.0f * x);
              int v = (int)(min_v + (max_v - min_v) * b + 0.5f);
              it[i] = Color(v, v, v);
            }

      - addressable_lambda:
          name: "On Reverse Smooth"
          update_interval: 16ms
          lambda: |-
            const int N = it.size();
            const float fade = (float) ${fade_px};
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
            if (p < 0.0f) p = 0.0f; if (p > 1.0f) p = 1.0f;
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const float front = p * (N + fade);
            for (int i = 0; i < N; i++) {
              int ri = (N - 1) - i;
              float x = (front - (float)i) / fade;
              if (x < 0.0f) x = 0.0f; if (x > 1.0f) x = 1.0f;
              float b = x * x * (3.0f - 2.0f * x);
              int v = (int)(min_v + (max_v - min_v) * b + 0.5f);
              it[ri] = Color(v, v, v);
            }

      - addressable_lambda:
          name: "Off Forward Smooth"
          update_interval: 16ms
          lambda: |-
            const int N = it.size();
            const float fade = (float) ${fade_px};
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
            if (p < 0.0f) p = 0.0f; if (p > 1.0f) p = 1.0f;
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const float front = p * (N + fade);
            for (int i = 0; i < N; i++) {
              float x = (front - (float)i) / fade;
              if (x < 0.0f) x = 0.0f; if (x > 1.0f) x = 1.0f;
              // Invertovaný smoothstep pro plynulý pokles na min_v
              float b = 1.0f - (x * x * (3.0f - 2.0f * x));
              int v = (int)(min_v + (max_v - min_v) * b + 0.5f);
              it[i] = Color(v, v, v);
            }

      - addressable_lambda:
          name: "Off Reverse Smooth"
          update_interval: 16ms
          lambda: |-
            const int N = it.size();
            const float fade = (float) ${fade_px};
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
            if (p < 0.0f) p = 0.0f; if (p > 1.0f) p = 1.0f;
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const float front = p * (N + fade);
            for (int i = 0; i < N; i++) {
              int ri = (N - 1) - i;
              float x = (front - (float)i) / fade;
              if (x < 0.0f) x = 0.0f; if (x > 1.0f) x = 1.0f;
              float b = 1.0f - (x * x * (3.0f - 2.0f * x));
              int v = (int)(min_v + (max_v - min_v) * b + 0.5f);
              it[ri] = Color(v, v, v);
            }

      - addressable_lambda:
          name: "Global Fade On"
          update_interval: 16ms
          lambda: |-
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
            if (p < 0.0f) p = 0.0f; if (p > 1.0f) p = 1.0f;
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const int v = (int)(min_v + (max_v - min_v) * p + 0.5f);
            for (int i = 0; i < it.size(); i++) it[i] = Color(v, v, v);

      - addressable_lambda:
          name: "Global Fade Off"
          update_interval: 16ms
          lambda: |-
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
            if (p < 0.0f) p = 0.0f; if (p > 1.0f) p = 1.0f;
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const int v = (int)(max_v - (max_v - min_v) * p + 0.5f);
            for (int i = 0; i < it.size(); i++) it[i] = Color(v, v, v);

binary_sensor:
  - platform: template
    id: bs_on_fwd
    name: "FX On Forward Running"
    device_class: running

  - platform: template
    id: bs_on_rev
    name: "FX On Reverse Running"
    device_class: running

  - platform: template
    id: bs_off_fwd
    name: "FX Off Forward Running"
    device_class: running

  - platform: template
    id: bs_off_rev
    name: "FX Off Reverse Running"
    device_class: running

script:
  - id: fx_on_forward
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_on_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip
          effect: "On Forward Smooth"
          # KLÍČ: Master jas musí být 1.0, aby lambda měla plný rozsah 0-255
          brightness: 1.0 
      - delay: !lambda "return (uint32_t)(id(fx_duration_ms) + 50);"
      - light.turn_on:
          id: strip
          effect: "None"
          # Teprve tady nastavíme cílový jas ze slideru
          brightness: !lambda "return id(fx_max_brightness).state / 100.0f;"
          red: 1.0
          green: 1.0
          blue: 1.0

  - id: fx_on_reverse
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_on_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip
          effect: "On Reverse Smooth"
          # KLÍČ: Nastavíme master jas na 100%, aby lambda měla plný rozsah (0-255)
          brightness: 1.0
          red: 1.0
          green: 1.0
          blue: 1.0
      # Přidáme 50ms rezervu pro jistotu, že lambda doběhla do konce
      - delay: !lambda "return (uint32_t)(id(fx_duration_ms) + 50);"
      - light.turn_on:
          id: strip
          effect: "None"
          # Teprve teď "ukotvíme" jas na hodnotu ze slideru
          brightness: !lambda "return id(fx_max_brightness).state / 100.0f;"
          red: 1.0
          green: 1.0
          blue: 1.0


  - id: fx_off_forward
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_off_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip
          effect: "Off Forward Smooth"
          # Master jas na 1.0, aby lambda mohla plynule klesat barvami k min_v
          brightness: 1.0 
      - delay: !lambda "return (uint32_t)(id(fx_duration_ms) + 50);"
      - lambda: |-
          if (id(fx_min_brightness).state > 0) {
            auto call = id(strip).make_call();
            call.set_effect("None");
            // Tady ukotvíme master jas na slider (např. těch 10 %)
            call.set_brightness(id(fx_min_brightness).state / 100.0f);
            call.set_rgb(1.0, 1.0, 1.0);
            call.perform();
          } else {
            id(strip).turn_off().perform();
          }

  - id: fx_off_reverse
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_off_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip
          effect: "Off Reverse Smooth"
          brightness: 1.0 
      - delay: !lambda "return (uint32_t)(id(fx_duration_ms) + 50);"
      - lambda: |-
          if (id(fx_min_brightness).state > 0) {
            auto call = id(strip).make_call();
            call.set_effect("None");
            call.set_brightness(id(fx_min_brightness).state / 100.0f);
            call.set_rgb(1.0, 1.0, 1.0);
            call.perform();
          } else {
            id(strip).turn_off().perform();
          }
  - id: fx_all_on
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_global_fade_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip
          effect: "Global Fade On"
          # Master jas na 100%, aby lambda plynule rozsvítila barvy z Min na Max
          brightness: 1.0
          red: 1.0
          green: 1.0
          blue: 1.0
      - delay: !lambda "return (uint32_t)(id(fx_duration_ms) + 50);"
      - light.turn_on:
          id: strip
          effect: "None"
          # "Ukotvení" na cílový jas ze slideru
          brightness: !lambda "return id(fx_max_brightness).state / 100.0f;"
          red: 1.0
          green: 1.0
          blue: 1.0

  - id: fx_all_off
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_global_fade_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip
          effect: "Global Fade Off"
          # Master jas na 100%, aby lambda plynule utlumila barvy z Max na Min
          brightness: 1.0
          red: 1.0
          green: 1.0
          blue: 1.0
      - delay: !lambda "return (uint32_t)(id(fx_duration_ms) + 50);"
      - lambda: |-
          if (id(fx_min_brightness).state > 0) {
            auto call = id(strip).make_call();
            call.set_effect("None");
            call.set_brightness(id(fx_min_brightness).state / 100.0f);
            call.set_rgb(1.0, 1.0, 1.0);
            call.perform();
          } else {
            id(strip).turn_off().perform();
          }


