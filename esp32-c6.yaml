script:
  # ==========================================================================
  # FX ON FORWARD
  # ==========================================================================
  - id: fx_on_forward
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_on_duration_s).state * 1000.0f);
          id(fx_current_effect) = "On Forward";
