            } else if (mode == "EaseInOut (Cubic)") {
              eased_p = p < 0.5f ? 4.0f * p * p * p : 1.0f - pow(-2.0f * p + 2.0f, 3.0f) / 2.0f;
            } else if (mode == "Bounce") {
              const float n1 = 7.5625f;
              const float d1 = 2.75f;
              float bp = p;
              if (bp < 1.0f / d1) {
                eased_p = n1 * bp * bp;
              } else if (bp < 2.0f / d1) {
                bp -= 1.5f / d1;
                eased_p = n1 * bp * bp + 0.75f;
              } else if (bp < 2.5f / d1) {
                bp -= 2.25f / d1;
                eased_p = n1 * bp * bp + 0.9375f;
              } else {
                bp -= 2.625f / d1;
                eased_p = n1 * bp * bp + 0.984375f;
              }
            }
            
            const float min_v = (id(fx_min_brightness).state / 100.0f) * 255.0f;
            const float max_v = (id(fx_max_brightness).state / 100.0f) * 255.0f;
            const float front = eased_p * (N + fade);
            
            for (int i = 0; i < N; i++) {
              int ri = (N - 1) - i;
              float x = (front - (float)i) / fade;
              if (x < 0.0f) x = 0.0f; if (x > 1.0f) x = 1.0f;
              float b = x * x * (3.0f - 2.0f * x);
              int v = (int)(min_v + (max_v - min_v) * b + 0.5f);
              it[ri] = Color(v, v, v);
            }

      # ======================================================================
      # OFF FORWARD SMOOTH
      # ======================================================================
      - addressable_lambda:
          name: "Off Forward Smooth"
          update_interval: 16ms
          lambda: |-
            const int N = it.size();
            const float fade = (float) ${fade_px};
            const uint32_t now = millis();
            float p = (id(fx_duration_ms) > 0) ? (float)(now - id(fx_start_ms)) / (float) id(fx_duration_ms) : 1.0f;
