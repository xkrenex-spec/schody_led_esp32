# Tlačítka pro ovládání obou pásků
button:
  # PÁSEK 1
  - platform: template
    name: "Strip 1: FX On Forward"
    on_press:
      - script.execute: fx_strip1_on_forward

  - platform: template
    name: "Strip 1: FX On Reverse"
    on_press:
      - script.execute: fx_strip1_on_reverse

  - platform: template
    name: "Strip 1: FX Off Forward"
    on_press:
      - script.execute: fx_strip1_off_forward

  - platform: template
    name: "Strip 1: FX Off Reverse"
    on_press:
      - script.execute: fx_strip1_off_reverse

  - platform: template
    name: "Strip 1: Fade Up"
    on_press:
      - script.execute: fx_strip1_fade_up

  - platform: template
    name: "Strip 1: Fade Down"
    on_press:
      - script.execute: fx_strip1_fade_down

  # PÁSEK 2
  - platform: template
    name: "Strip 2: FX On Forward"
    on_press:
      - script.execute: fx_strip2_on_forward

  - platform: template
    name: "Strip 2: FX On Reverse"
    on_press:
      - script.execute: fx_strip2_on_reverse

  - platform: template
    name: "Strip 2: FX Off Forward"
    on_press:
      - script.execute: fx_strip2_off_forward

  - platform: template
    name: "Strip 2: FX Off Reverse"
    on_press:
      - script.execute: fx_strip2_off_reverse

  - platform: template
    name: "Strip 2: Fade Up"
    on_press:
      - script.execute: fx_strip2_fade_up

  - platform: template
    name: "Strip 2: Fade Down"
    on_press:
      - script.execute: fx_strip2_fade_down

# Skripty pro pásek 1
script:
  - id: fx_strip1_on_forward
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_on_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "On Forward Smooth"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "None"

  - id: fx_strip1_on_reverse
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_on_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "On Reverse Smooth"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "None"

  - id: fx_strip1_off_forward
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_off_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "Off Forward Smooth"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - light.turn_off:
          id: strip_1

  - id: fx_strip1_off_reverse
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_off_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "Off Reverse Smooth"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - light.turn_off:
          id: strip_1

  - id: fx_strip1_fade_up
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fade_duration_s).state * 1000.0f);
          id(fade_start_brightness) = id(fade_up_from_brightness).state / 100.0f;
          id(fade_end_brightness) = id(fade_up_to_brightness).state / 100.0f;
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "Fade Up Brightness"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - light.turn_on:
          id: strip_1
          brightness: !lambda "return id(fade_up_to_brightness).state / 100.0f;"
          effect: "None"

  - id: fx_strip1_fade_down
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fade_duration_s).state * 1000.0f);
          id(fade_start_brightness) = id(fade_down_from_brightness).state / 100.0f;
          id(fade_end_brightness) = id(fade_down_to_brightness).state / 100.0f;
      - light.turn_on:
          id: strip_1
          brightness: 100%
          effect: "Fade Down Brightness"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - if:
          condition:
            lambda: 'return id(fade_down_to_brightness).state == 0;'
          then:
            - light.turn_off:
                id: strip_1
          else:
            - light.turn_on:
                id: strip_1
                brightness: !lambda "return id(fade_down_to_brightness).state / 100.0f;"
                effect: "None"

  # Skripty pro pásek 2
  - id: fx_strip2_on_forward
    mode: restart
    then:
      - lambda: |-
          id(fx_start_ms) = millis();
          id(fx_duration_ms) = (int)(id(fx_on_duration_s).state * 1000.0f);
      - light.turn_on:
          id: strip_2
          brightness: 100%
          effect: "On Forward Smooth"
      - delay: !lambda "return (uint32_t) id(fx_duration_ms);"
      - light.turn_on:
          id: strip_2
          brightness: 100%
          effect: "None"

  - id: fx_strip2_on_reverse
    mode: restart
    then:
      - lambda: |-
